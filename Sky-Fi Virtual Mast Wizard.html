/* ============================================================
   Vodafone Sky-Fi Design System — Colors & Typography
   Source: Vodafone brand guidelines + Sky-Fi product context
   ============================================================ */

/* ── Fonts ── */
:root {

  /* ─────────────────────────────────────────────
     BRAND PALETTE
     Core Vodafone brand colors
  ───────────────────────────────────────────── */

  /* Primary */
  --vf-red:          #E60000;   /* Vodafone Red — primary brand */
  --vf-red-dark:     #B30000;   /* Pressed / hover */
  --vf-red-light:    #FF4040;   /* Light tint */
  --vf-red-tint:     #FFE5E5;   /* Background tint */

  /* Neutral */
  --vf-dark:         #1A1A1A;   /* Near-black body text */
  --vf-charcoal:     #333333;   /* Secondary dark */
  --vf-mid-grey:     #4A4D4E;   /* UI grey */
  --vf-grey:         #767676;   /* Muted text */
  --vf-light-grey:   #BEBEBE;   /* Borders, dividers */
  --vf-off-white:    #F4F4F4;   /* Surface / background */
  --vf-white:        #FFFFFF;

  /* Extended palette (Vodafone full brand set) */
  --vf-violet:       #9C2AA0;   /* Vodafone Violet */
  --vf-plum:         #5E2750;   /* Vodafone Plum */
  --vf-aqua:         #00B0CA;   /* Vodafone Aqua */
  --vf-teal:         #007C92;   /* Vodafone Teal */
  --vf-spring:       #A8B400;   /* Vodafone Spring */
  --vf-yellow:       #FECB00;   /* Vodafone Yellow */
  --vf-amber:        #EB9800;   /* Vodafone Amber */

  /* Sky-Fi product accent (sky + tech feel) */
  --sf-sky-blue:     #00B0CA;   /* Aliased from aqua — sky/drone theme */
  --sf-sky-dark:     #007C92;   /* Deeper sky / signal */
  --sf-sky-light:    #E0F7FA;   /* Pale sky background */
  --sf-signal-green: #A8B400;   /* Signal good / operational */
  --sf-signal-amber: #EB9800;   /* Warning / degraded */
  --sf-signal-red:   #E60000;   /* Critical / alert */

  /* ─────────────────────────────────────────────
     SEMANTIC COLOR TOKENS
  ───────────────────────────────────────────── */

  --color-primary:         var(--vf-red);
  --color-primary-hover:   var(--vf-red-dark);
  --color-primary-light:   var(--vf-red-tint);

  --color-accent:          var(--sf-sky-blue);
  --color-accent-dark:     var(--sf-sky-dark);

  --color-bg:              var(--vf-white);
  --color-bg-surface:      var(--vf-off-white);
  --color-bg-dark:         var(--vf-dark);

  --color-text-primary:    var(--vf-dark);
  --color-text-secondary:  var(--vf-mid-grey);
  --color-text-muted:      var(--vf-grey);
  --color-text-inverse:    var(--vf-white);
  --color-text-link:        var(--vf-red);

  --color-border:          var(--vf-light-grey);
  --color-border-strong:   var(--vf-mid-grey);

  --color-success:         var(--sf-signal-green);
  --color-warning:         var(--sf-signal-amber);
  --color-danger:          var(--sf-signal-red);

  /* ─────────────────────────────────────────────
     TYPOGRAPHY SYSTEM
  ───────────────────────────────────────────── */

  --font-brand:     'VodafoneRg', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  --font-body:      'VodafoneRg', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  --font-mono:      'Courier New', Courier, monospace;

  /* Scale */
  --text-xs:    11px;
  --text-sm:    13px;
  --text-base:  16px;
  --text-md:    18px;
  --text-lg:    22px;
  --text-xl:    28px;
  --text-2xl:   36px;
  --text-3xl:   48px;
  --text-4xl:   64px;
  --text-5xl:   80px;

  /* Weight */
  --fw-light:    300;
  --fw-regular:  400;
  --fw-bold:     700;

  /* Leading */
  --leading-tight:   1.15;
  --leading-normal:  1.5;
  --leading-relaxed: 1.75;

  /* Letter spacing */
  --tracking-tight:  -0.02em;
  --tracking-normal: 0em;
  --tracking-wide:   0.06em;
  --tracking-wider:  0.12em;

  /* ─────────────────────────────────────────────
     SEMANTIC TYPE TOKENS
     (assign to HTML elements via reset/base css)
  ───────────────────────────────────────────── */

  --type-h1-size:     var(--text-3xl);
  --type-h1-weight:   var(--fw-bold);
  --type-h1-leading:  var(--leading-tight);
  --type-h1-tracking: var(--tracking-tight);

  --type-h2-size:     var(--text-2xl);
  --type-h2-weight:   var(--fw-bold);
  --type-h2-leading:  var(--leading-tight);
  --type-h2-tracking: var(--tracking-tight);

  --type-h3-size:     var(--text-xl);
  --type-h3-weight:   var(--fw-bold);
  --type-h3-leading:  1.2;

  --type-h4-size:     var(--text-lg);
  --type-h4-weight:   var(--fw-bold);
  --type-h4-leading:  1.25;

  --type-body-size:   var(--text-base);
  --type-body-weight: var(--fw-regular);
  --type-body-leading: var(--leading-normal);

  --type-small-size:  var(--text-sm);
  --type-small-weight: var(--fw-regular);
  --type-small-leading: var(--leading-relaxed);

  --type-label-size:    var(--text-xs);
  --type-label-weight:  var(--fw-bold);
  --type-label-tracking: var(--tracking-wider);
  --type-label-transform: uppercase;

  --type-code-size:   var(--text-sm);
  --type-code-family: var(--font-mono);

  /* ─────────────────────────────────────────────
     SPACING SCALE
  ───────────────────────────────────────────── */

  --space-1:   4px;
  --space-2:   8px;
  --space-3:   12px;
  --space-4:   16px;
  --space-5:   20px;
  --space-6:   24px;
  --space-8:   32px;
  --space-10:  40px;
  --space-12:  48px;
  --space-16:  64px;
  --space-20:  80px;
  --space-24:  96px;
  --space-32:  128px;

  /* ─────────────────────────────────────────────
     BORDER RADIUS
  ───────────────────────────────────────────── */

  --radius-sm:   4px;
  --radius-md:   8px;
  --radius-lg:   16px;
  --radius-xl:   24px;
  --radius-full: 9999px;

  /* ─────────────────────────────────────────────
     SHADOWS (elevation system)
  ───────────────────────────────────────────── */

  --shadow-xs:  0 1px 2px rgba(0,0,0,0.08);
  --shadow-sm:  0 2px 4px rgba(0,0,0,0.10);
  --shadow-md:  0 4px 12px rgba(0,0,0,0.12);
  --shadow-lg:  0 8px 24px rgba(0,0,0,0.14);
  --shadow-xl:  0 16px 48px rgba(0,0,0,0.18);
  --shadow-red: 0 4px 16px rgba(230,0,0,0.25);

  /* ─────────────────────────────────────────────
     TRANSITIONS
  ───────────────────────────────────────────── */

  --ease-out:   cubic-bezier(0.0, 0.0, 0.2, 1);
  --ease-in:    cubic-bezier(0.4, 0.0, 1, 1);
  --ease-inout: cubic-bezier(0.4, 0.0, 0.2, 1);
  --duration-fast:   150ms;
  --duration-normal: 250ms;
  --duration-slow:   400ms;
}


/* ============================================================
   Sky-Fi Deployment Wizard — App styles
   Mobile-first; tablet/desktop adds the left rail.
   Theme toggled via [data-theme="dark"] on the root.
   ============================================================ */

*, *::before, *::after { box-sizing: border-box; }
html, body { height: 100%; }
body {
  margin: 0;
  font-family: var(--font-body);
  font-size: 16px;
  color: var(--color-text-primary);
  background: var(--wz-canvas);
  -webkit-font-smoothing: antialiased;
}

/* ── Theme surface tokens (light default) ─────────────────── */
:root, [data-theme="light"] {
  --wz-canvas:        #F0EDE8;
  --wz-rail-bg:       #FFFFFF;
  --wz-rail-fg:       var(--vf-dark);
  --wz-rail-divider:  rgba(0,0,0,0.06);
  --wz-card-bg:       #FFFFFF;
  --wz-card-bg-2:     #F7F4EE;
  --wz-card-stroke:   #E6E1D6;
  --wz-input-bg:      #FFFFFF;
  --wz-input-stroke:  #D8D2C4;
  --wz-input-focus:   var(--vf-red);
  --wz-overlay:       rgba(255,255,255,0.92);
  --wz-shadow-card:   0 1px 0 rgba(0,0,0,0.04), 0 2px 6px rgba(0,0,0,0.05);
  --wz-shadow-elev:   0 4px 18px rgba(0,0,0,0.08);
  --wz-text-strong:   var(--vf-dark);
  --wz-text-soft:     var(--vf-mid-grey);
  --wz-text-muted:    var(--vf-grey);
  --wz-divider:       #E6E1D6;
  --wz-chip-bg:       #F1ECE0;
  --wz-mono-bg:       rgba(0,0,0,0.04);
}

[data-theme="dark"] {
  --wz-canvas:        #0E1216;
  --wz-rail-bg:       #131A21;
  --wz-rail-fg:       #ECECEC;
  --wz-rail-divider:  rgba(255,255,255,0.06);
  --wz-card-bg:       #1A2129;
  --wz-card-bg-2:     #161D24;
  --wz-card-stroke:   #232C36;
  --wz-input-bg:      #11171D;
  --wz-input-stroke:  #2A323D;
  --wz-input-focus:   #FF4D4D;
  --wz-overlay:       rgba(14,18,22,0.88);
  --wz-shadow-card:   0 1px 0 rgba(255,255,255,0.02), 0 2px 6px rgba(0,0,0,0.5);
  --wz-shadow-elev:   0 8px 24px rgba(0,0,0,0.55);
  --wz-text-strong:   #F2F2F2;
  --wz-text-soft:     #B8BFC7;
  --wz-text-muted:    #7A828C;
  --wz-divider:       #232C36;
  --wz-chip-bg:       #232C36;
  --wz-mono-bg:       rgba(255,255,255,0.05);
}

/* ── App grid ─────────────────────────────────────────────── */
.wz-app {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Mobile: rail is hidden, main is full-bleed */
.wz-rail { display: none; }

.wz-main {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  background: var(--wz-canvas);
  flex: 1;
}

/* ── Topbar ───────────────────────────────────────────────── */
.wz-topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 14px 16px;
  background: var(--wz-rail-bg);
  border-bottom: 1px solid var(--wz-divider);
  position: sticky;
  top: 0;
  z-index: 30;
}
.wz-topbar-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
.wz-topbar-eyebrow {
  display: flex; align-items: center; gap: 8px;
  font-size: 13px; font-weight: 700; color: var(--wz-text-strong);
  letter-spacing: 0.01em;
}
.wz-topbar-right {
  display: flex; align-items: center; gap: 10px;
  font-size: 12px;
}
.wz-topbar-pkg {
  display: none;
  align-items: center; gap: 6px;
  background: var(--wz-chip-bg);
  border-radius: 6px;
  padding: 6px 10px;
}
.wz-topbar-pkg-label {
  font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--wz-text-muted); font-weight: 700;
}
.wz-topbar-pkg code {
  font-family: var(--font-mono); font-size: 12px; color: var(--wz-text-strong); font-weight: 700;
}
.wz-topbar-menu { display: flex; }
.wz-iconbtn {
  background: transparent; border: 0; padding: 6px;
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--wz-text-strong); cursor: pointer; border-radius: 6px;
  font-size: 22px; line-height: 1; font-family: inherit;
}
.wz-iconbtn:hover { background: var(--wz-chip-bg); }

/* ── Progress strip ───────────────────────────────────────── */
.wz-progress {
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding: 10px 16px 12px;
  background: var(--wz-rail-bg);
  border-bottom: 1px solid var(--wz-divider);
  position: sticky;
  top: 56px;
  z-index: 29;
}
.wz-progress-bar {
  height: 3px;
  background: var(--wz-chip-bg);
  border-radius: 2px;
  overflow: hidden;
  position: relative;
}
.wz-progress-fill {
  height: 100%;
  background: var(--vf-red);
  transition: width 300ms var(--ease-out);
}
.wz-progress-meta {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; letter-spacing: 0.04em;
  color: var(--wz-text-soft);
  text-transform: uppercase;
}
.wz-progress-meta strong { color: var(--wz-text-strong); font-weight: 700; }
.wz-progress-spacer { color: var(--wz-text-muted); }

/* ── Step head ────────────────────────────────────────────── */
.wz-scroll {
  flex: 1;
  overflow-y: auto;
}
.wz-stephead {
  padding: 20px 16px 4px;
}
.wz-stephead-row {
  display: flex; align-items: flex-start; gap: 14px;
}
.wz-stephead-num {
  flex-shrink: 0;
  font-family: var(--font-mono);
  display: flex; flex-direction: column;
  line-height: 0.95;
}
.wz-stephead-num-current {
  font-size: 38px; font-weight: 700; color: var(--vf-red);
  letter-spacing: -0.02em;
}
.wz-stephead-num-total {
  font-size: 11px; color: var(--wz-text-muted); margin-top: 2px;
}
.wz-stephead-text { flex: 1; min-width: 0; }
.wz-stephead-eyebrow {
  font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--wz-text-muted); font-weight: 700;
  margin-bottom: 4px;
}
.wz-stephead-title {
  margin: 0;
  font-size: 22px;
  line-height: 1.2;
  font-weight: 700;
  color: var(--wz-text-strong);
  letter-spacing: -0.01em;
  text-wrap: pretty;
}

/* ── Step body ────────────────────────────────────────────── */
.wz-step-content { padding: 12px 16px 20px; }
.wz-step-body {
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.wz-step-spacer { height: 100px; }

/* ── Field ────────────────────────────────────────────────── */
.wz-field {
  display: flex; flex-direction: column; gap: 8px;
}
.wz-field-header {
  display: flex; align-items: baseline; justify-content: space-between; gap: 8px;
}
.wz-field-label {
  font-size: 14px; font-weight: 700; color: var(--wz-text-strong);
}
.wz-field-required { color: var(--vf-red); margin-left: 4px; }
.wz-field-ref {
  font-family: var(--font-mono); font-size: 10px;
  color: var(--wz-text-muted); letter-spacing: 0.04em;
  background: var(--wz-mono-bg);
  padding: 2px 6px; border-radius: 4px;
}
.wz-field-helper {
  font-size: 13px; color: var(--wz-text-soft); line-height: 1.45;
  margin: -2px 0 2px;
}
.wz-field-error {
  font-size: 12px; color: var(--vf-red); font-weight: 700;
  display: flex; gap: 6px; align-items: center;
  background: var(--vf-red-tint);
  padding: 8px 10px;
  border-radius: 6px;
}
[data-theme="dark"] .wz-field-error { background: rgba(230,0,0,0.18); }
.wz-field-playback {
  background: var(--wz-card-bg-2);
  border-left: 3px solid var(--sf-sky-blue);
  padding: 8px 12px;
  border-radius: 0 6px 6px 0;
  display: flex; align-items: center; gap: 10px;
}
.wz-field-playback-tag {
  font-size: 10px; letter-spacing: 0.12em; font-weight: 700;
  color: var(--sf-sky-dark); text-transform: uppercase;
}
.wz-field-playback-value {
  font-family: var(--font-mono); font-size: 13px; color: var(--wz-text-strong);
}

/* ── Card ─────────────────────────────────────────────────── */
.wz-card {
  background: var(--wz-card-bg);
  border: 1px solid var(--wz-card-stroke);
  border-radius: 10px;
  box-shadow: var(--wz-shadow-card);
  overflow: hidden;
}
.wz-card-header {
  display: flex; align-items: flex-start; justify-content: space-between;
  gap: 12px;
  padding: 14px 16px 10px;
  border-bottom: 1px solid var(--wz-divider);
}
.wz-card--tight .wz-card-header { border-bottom: 0; padding-bottom: 6px; }
.wz-card-eyebrow {
  font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--wz-text-muted); font-weight: 700; margin-bottom: 3px;
}
.wz-card-title {
  margin: 0;
  font-size: 15px; font-weight: 700; color: var(--wz-text-strong);
  line-height: 1.3;
}
.wz-card-footer {
  background: var(--wz-card-bg-2);
  padding: 10px 16px;
  border-top: 1px solid var(--wz-divider);
  display: flex; gap: 8px; align-items: center;
  font-size: 11px;
}
.wz-card-footer-label {
  font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--wz-text-muted); font-weight: 700;
}
.wz-card-footer-value {
  font-family: var(--font-mono); font-size: 11px; color: var(--wz-text-soft);
}

/* ── Data rows (key/value) ────────────────────────────────── */
.wz-data-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 0;
  padding: 4px 16px 16px;
}
.wz-card .wz-data-grid { padding: 4px 16px 16px; }
.wz-card--tight .wz-data-grid { padding: 0 16px 14px; }
.wz-data-grid--cols2 { grid-template-columns: 1fr 1fr; gap: 0 18px; }
.wz-step-body > .wz-data-grid { /* outside card */
  background: var(--wz-card-bg);
  border: 1px solid var(--wz-card-stroke);
  border-radius: 10px;
  padding: 6px 14px;
  box-shadow: var(--wz-shadow-card);
}
.wz-data-row {
  display: flex; align-items: baseline; justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px dashed var(--wz-divider);
  gap: 12px;
  min-width: 0;
}
.wz-data-grid--cols2 .wz-data-row:nth-last-child(-n+2) { border-bottom: 0; }
.wz-data-grid:not(.wz-data-grid--cols2) .wz-data-row:last-child { border-bottom: 0; }
.wz-data-label {
  font-size: 12px;
  color: var(--wz-text-muted);
  letter-spacing: 0.02em;
}
.wz-data-value {
  display: inline-flex; align-items: baseline; gap: 4px;
  font-family: var(--font-mono);
  color: var(--wz-text-strong);
}
.wz-data-number {
  font-size: 15px; font-weight: 700;
}
.wz-data-unit {
  font-size: 11px; color: var(--wz-text-muted); font-weight: 400;
  text-transform: uppercase; letter-spacing: 0.04em;
}
.wz-data-row[data-status="warn"] .wz-data-number { color: var(--sf-signal-amber); }
.wz-data-row[data-status="ok"] .wz-data-number { color: var(--wz-text-strong); }
.wz-data-row[data-status="pending"] .wz-data-number { color: var(--wz-text-muted); }

/* ── Pills ────────────────────────────────────────────────── */
.wz-pill {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 8px;
  border-radius: 9999px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  font-family: var(--font-body);
  white-space: nowrap;
  border: 1px solid transparent;
}
.wz-pill-dot {
  width: 6px; height: 6px; border-radius: 50%; background: currentColor;
  flex-shrink: 0;
}
.wz-pill[data-status="ok"] {
  background: rgba(168, 180, 0, 0.14); color: #6F7B00; border-color: rgba(168,180,0,0.3);
}
[data-theme="dark"] .wz-pill[data-status="ok"] { color: #C5D24C; }
.wz-pill[data-status="info"] {
  background: rgba(0, 176, 202, 0.12); color: var(--sf-sky-dark); border-color: rgba(0,176,202,0.3);
}
[data-theme="dark"] .wz-pill[data-status="info"] { color: #5EC8DC; }
.wz-pill[data-status="warn"] {
  background: rgba(235, 152, 0, 0.14); color: #B36F00; border-color: rgba(235,152,0,0.3);
}
[data-theme="dark"] .wz-pill[data-status="warn"] { color: #F5B547; }
.wz-pill[data-status="error"] {
  background: rgba(230, 0, 0, 0.10); color: var(--vf-red); border-color: rgba(230,0,0,0.3);
}
.wz-pill[data-status="pending"] {
  background: var(--wz-chip-bg); color: var(--wz-text-muted); border-color: var(--wz-divider);
}

/* ── Callout ──────────────────────────────────────────────── */
.wz-callout {
  display: flex; gap: 12px;
  padding: 12px 14px;
  border-radius: 8px;
  background: var(--wz-card-bg-2);
  border-left: 3px solid var(--sf-sky-blue);
}
.wz-callout[data-tone="info"] { border-left-color: var(--sf-sky-blue); }
.wz-callout[data-tone="warn"] { border-left-color: var(--sf-signal-amber); }
.wz-callout[data-tone="error"]{ border-left-color: var(--vf-red); }
.wz-callout[data-tone="ok"]   { border-left-color: #A8B400; }
.wz-callout-icon {
  flex-shrink: 0;
  width: 20px; height: 20px;
  border-radius: 50%;
  background: var(--wz-rail-bg);
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 12px;
  color: var(--sf-sky-dark);
  font-family: var(--font-mono);
}
.wz-callout[data-tone="warn"] .wz-callout-icon { color: var(--sf-signal-amber); }
.wz-callout[data-tone="error"] .wz-callout-icon { color: var(--vf-red); }
.wz-callout[data-tone="ok"] .wz-callout-icon { color: #6F7B00; }
.wz-callout-body { flex: 1; min-width: 0; }
.wz-callout-title {
  font-size: 13px; font-weight: 700; color: var(--wz-text-strong);
  margin-bottom: 2px;
}
.wz-callout-text {
  font-size: 13px; color: var(--wz-text-soft); line-height: 1.5;
}

/* ── Choice tile (radio/checkbox card) ────────────────────── */
.wz-choice {
  display: flex; gap: 12px; align-items: flex-start;
  padding: 12px 14px;
  background: var(--wz-card-bg);
  border: 1px solid var(--wz-card-stroke);
  border-radius: 8px;
  cursor: pointer;
  transition: border-color 150ms, background 150ms;
}
.wz-choice:hover { border-color: var(--vf-light-grey); }
.wz-choice--checked {
  border-color: var(--vf-red);
  background: var(--vf-red-tint);
}
[data-theme="dark"] .wz-choice--checked { background: rgba(230,0,0,0.10); }
.wz-choice--disabled {
  opacity: 0.55; cursor: not-allowed;
}
.wz-choice-input { position: absolute; opacity: 0; pointer-events: none; }
.wz-choice-mark {
  flex-shrink: 0;
  width: 18px; height: 18px;
  border-radius: 4px;
  border: 1.5px solid var(--wz-input-stroke);
  background: var(--wz-input-bg);
  display: inline-flex; align-items: center; justify-content: center;
  transition: all 120ms;
}
.wz-choice input[type="radio"] + .wz-choice-mark { border-radius: 50%; }
.wz-choice--checked .wz-choice-mark {
  border-color: var(--vf-red); background: var(--vf-red);
}
.wz-choice--checked .wz-choice-mark::after {
  content: "";
  width: 8px; height: 8px;
  background: white;
  border-radius: inherit;
}
.wz-choice input[type="checkbox"]:checked ~ .wz-choice-mark::after,
.wz-choice--checked input[type="checkbox"] + .wz-choice-mark::after { /* fallback */ }
.wz-choice-body { flex: 1; min-width: 0; }
.wz-choice-label {
  display: block;
  font-size: 14px; font-weight: 600; color: var(--wz-text-strong);
  line-height: 1.35;
}
.wz-choice-sub {
  display: block;
  font-size: 12px; color: var(--wz-text-soft);
  margin-top: 3px; line-height: 1.45;
}
.wz-choice[data-severity="high"].wz-choice--checked {
  border-color: var(--sf-signal-amber);
  background: rgba(235,152,0,0.10);
}

.wz-radio-list { display: flex; flex-direction: column; gap: 8px; }
.wz-radio-list--inline { flex-direction: row; flex-wrap: wrap; }
.wz-radio-list--inline .wz-choice { flex: 1 1 calc(50% - 4px); min-width: 0; }
.wz-check-list { display: flex; flex-direction: column; gap: 8px; padding: 14px 16px 16px; }

/* ── Text input ───────────────────────────────────────────── */
.wz-input-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--wz-input-bg);
  border: 1px solid var(--wz-input-stroke);
  border-radius: 8px;
  padding: 0 12px;
  transition: border-color 120ms, box-shadow 120ms;
}
.wz-input-wrap:focus-within {
  border-color: var(--wz-input-focus);
  box-shadow: 0 0 0 3px rgba(230,0,0,0.12);
}
.wz-input {
  border: 0; outline: 0; background: transparent;
  padding: 12px 0;
  font-size: 15px; color: var(--wz-text-strong);
  font-family: inherit;
  flex: 1;
  min-width: 0;
}
.wz-input::placeholder { color: var(--wz-text-muted); }
.wz-input-prefix, .wz-input-suffix {
  color: var(--wz-text-muted); display: inline-flex; align-items: center;
}

/* ── Row layout helpers ──────────────────────────────────── */
.wz-row-2 { display: grid; grid-template-columns: 1fr; gap: 12px; }
.wz-row-actions { display: flex; gap: 8px; flex-wrap: wrap; }

/* ── Buttons ──────────────────────────────────────────────── */
.wz-btn {
  display: inline-flex; align-items: center; gap: 8px;
  justify-content: center;
  font-family: inherit; font-weight: 700;
  font-size: 14px;
  padding: 11px 16px;
  border-radius: 8px;
  border: 1px solid transparent;
  cursor: pointer;
  transition: background 150ms, transform 100ms, border-color 150ms;
  background: transparent;
  color: var(--wz-text-strong);
}
.wz-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.wz-btn--primary {
  background: var(--vf-red); color: white;
  box-shadow: var(--shadow-red);
}
.wz-btn--primary:hover:not(:disabled) { background: var(--vf-red-dark); }
.wz-btn--primary:active:not(:disabled) { transform: scale(0.98); }
.wz-btn--primary:disabled { background: var(--wz-input-stroke); color: var(--wz-text-muted); box-shadow: none; }
.wz-btn--ghost {
  background: var(--wz-card-bg);
  color: var(--wz-text-strong);
  border-color: var(--wz-input-stroke);
}
.wz-btn--ghost:hover:not(:disabled) { border-color: var(--vf-mid-grey); }
.wz-btn--xl {
  padding: 14px 20px;
  font-size: 15px;
}

/* ── Footer (sticky bottom) ───────────────────────────────── */
.wz-footer {
  position: sticky;
  bottom: 0;
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 10px;
  padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
  background: var(--wz-overlay);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-top: 1px solid var(--wz-divider);
  z-index: 25;
}
.wz-footer .wz-btn { white-space: nowrap; }
.wz-footer .wz-btn--primary { padding: 13px 16px; font-size: 14px; }
.wz-footer-state {
  display: flex; justify-content: center;
  font-size: 12px; color: var(--wz-text-soft);
  text-align: center;
  min-width: 0;
}
.wz-footer-hint {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 10px;
  border-radius: 9999px;
  background: var(--wz-chip-bg);
  font-size: 11px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  font-weight: 700;
  color: var(--wz-text-soft);
}
.wz-footer-hint-dot {
  width: 6px; height: 6px; border-radius: 50%; background: var(--sf-signal-amber);
}
.wz-footer-hint--ok { color: #6F7B00; }
[data-theme="dark"] .wz-footer-hint--ok { color: #C5D24C; }

/* ── Map (location step) ──────────────────────────────────── */
.wz-map {
  position: relative;
  border-radius: 10px;
  overflow: hidden;
  border: 1px solid var(--wz-card-stroke);
  aspect-ratio: 4 / 3;
  cursor: crosshair;
  background: #EDE6D8;
  user-select: none;
}
[data-theme="dark"] .wz-map { filter: brightness(0.7); }
.wz-map-svg { position: absolute; inset: 0; width: 100%; height: 100%; }
.wz-map-crosshair {
  position: absolute; inset: 0;
  pointer-events: none;
}
.wz-map-crosshair span:nth-child(1),
.wz-map-crosshair span:nth-child(2) {
  position: absolute; background: rgba(0,0,0,0.18);
}
.wz-map-crosshair span:nth-child(1) { left: 50%; top: 0; bottom: 0; width: 1px; }
.wz-map-crosshair span:nth-child(2) { top: 50%; left: 0; right: 0; height: 1px; }

.wz-map-pin {
  position: absolute;
  transform: translate(-50%, -100%);
  pointer-events: none;
  width: 28px; height: 28px;
}
.wz-map-pin-ring {
  position: absolute; left: 50%; bottom: 0;
  transform: translate(-50%, 50%);
  width: 28px; height: 28px;
  border-radius: 50%;
  background: rgba(230,0,0,0.18);
  animation: pinPulse 1.6s var(--ease-out) infinite;
}
.wz-map-pin-dot {
  position: absolute; left: 50%; bottom: 0;
  transform: translate(-50%, 0);
  width: 16px; height: 16px;
  border-radius: 50% 50% 50% 0;
  background: var(--vf-red);
  border: 2px solid white;
  transform-origin: bottom center;
  rotate: -45deg;
  box-shadow: 0 4px 8px rgba(0,0,0,0.2);
}
@keyframes pinPulse {
  0%   { transform: translate(-50%, 50%) scale(0.6); opacity: 0.7; }
  100% { transform: translate(-50%, 50%) scale(2); opacity: 0; }
}
.wz-map-overlay-top {
  position: absolute; top: 8px; left: 8px; right: 8px;
  display: flex; justify-content: space-between; align-items: center;
  pointer-events: none;
}
.wz-map-coord {
  background: rgba(0,0,0,0.75); color: white;
  padding: 4px 8px; border-radius: 4px;
  font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.02em;
  font-weight: 700;
}
.wz-map-scale {
  background: white;
  padding: 4px 10px; border-radius: 4px;
  font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
  color: var(--wz-text-strong);
  border: 1px solid var(--wz-card-stroke);
}

/* ── Photo step ───────────────────────────────────────────── */
.wz-photo-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}
.wz-photo-slot {
  position: relative;
  aspect-ratio: 4/3;
  border-radius: 8px;
  overflow: hidden;
  background: var(--wz-card-bg-2);
  border: 1px solid var(--wz-card-stroke);
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 4px;
  font-size: 12px; color: var(--wz-text-soft);
}
.wz-photo-slot--add {
  border: 1.5px dashed var(--wz-input-stroke);
  background: transparent;
  cursor: pointer;
  padding: 12px;
  font-family: inherit;
  font-weight: 700;
}
.wz-photo-slot--add:hover { border-color: var(--vf-red); color: var(--vf-red); }
.wz-photo-slot-sub { font-size: 11px; color: var(--wz-text-muted); font-weight: 400; }
.wz-photo-img { width: 100%; height: 100%; object-fit: cover; }
.wz-photo-tag {
  position: absolute; left: 6px; bottom: 6px;
  background: rgba(0,0,0,0.7); color: white;
  padding: 2px 6px; border-radius: 3px;
  font-family: var(--font-mono); font-size: 9px;
  letter-spacing: 0.08em; font-weight: 700;
}
.wz-photo-synthetic {
  width: 100%; height: 100%; position: relative;
  display: flex; align-items: center; justify-content: center;
}
.wz-photo-synthetic-svg { width: 100%; height: 100%; position: absolute; inset: 0; }
.wz-photo-synthetic-tag {
  position: absolute; top: 6px; right: 6px;
  background: rgba(255,255,255,0.85); color: var(--wz-text-strong);
  padding: 2px 6px; border-radius: 3px;
  font-family: var(--font-mono); font-size: 9px;
  letter-spacing: 0.06em; font-weight: 700;
}

/* ── Crew rows ────────────────────────────────────────────── */
.wz-crew-list { display: flex; flex-direction: column; gap: 8px; }
.wz-crew {
  display: flex; gap: 12px; align-items: center;
  padding: 10px 12px;
  background: var(--wz-card-bg);
  border: 1px solid var(--wz-card-stroke);
  border-radius: 8px;
  cursor: pointer;
  transition: border-color 150ms;
}
.wz-crew:hover { border-color: var(--vf-light-grey); }
.wz-crew--checked { border-color: var(--vf-red); background: var(--vf-red-tint); }
[data-theme="dark"] .wz-crew--checked { background: rgba(230,0,0,0.10); }
.wz-crew--disabled { opacity: 0.5; cursor: not-allowed; }
.wz-crew-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--sf-sky-blue); color: white;
  font-weight: 700; font-size: 13px;
  flex-shrink: 0; letter-spacing: 0.02em;
}
.wz-crew-body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 1px; }
.wz-crew-name { font-size: 14px; font-weight: 700; color: var(--wz-text-strong); }
.wz-crew-role { font-size: 12px; color: var(--wz-text-soft); }
.wz-crew-cert { font-family: var(--font-mono); font-size: 10px; color: var(--wz-text-muted); margin-top: 2px; }
.wz-crew-status {
  font-size: 10px; letter-spacing: 0.1em; font-weight: 700;
  color: var(--wz-text-muted); text-transform: uppercase;
}

/* ── Trigger list (contact step) ──────────────────────────── */
.wz-trigger-list { list-style: none; margin: 0; padding: 12px 16px 16px; display: flex; flex-direction: column; gap: 8px; }
.wz-trigger-list li {
  display: flex; align-items: center; gap: 10px;
  font-size: 13px; color: var(--wz-text-soft);
}
.wz-trigger-dot {
  width: 8px; height: 8px; border-radius: 50%; background: var(--sf-sky-blue); flex-shrink: 0;
}
.wz-trigger-dot[data-tone="warn"] { background: var(--sf-signal-amber); }
.wz-trigger-dot[data-tone="error"] { background: var(--vf-red); }

/* ── Forecast bars (weather) ──────────────────────────────── */
.wz-forecast {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 8px;
  padding: 12px 16px 8px;
}
.wz-forecast-cell {
  display: flex; flex-direction: column; align-items: center;
  gap: 4px;
  padding: 6px 4px;
  border-radius: 6px;
  background: var(--wz-card-bg-2);
}
.wz-forecast-cell[data-ok="false"] { background: rgba(235,152,0,0.12); }
.wz-forecast-time {
  font-family: var(--font-mono); font-size: 10px;
  color: var(--wz-text-muted); letter-spacing: 0.02em;
}
.wz-forecast-bar {
  width: 12px; height: 48px;
  background: var(--wz-divider);
  border-radius: 2px;
  position: relative;
  display: flex; align-items: flex-end;
}
.wz-forecast-bar span {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: var(--sf-sky-blue);
  border-radius: 2px 2px 0 0;
}
.wz-forecast-cell[data-ok="false"] .wz-forecast-bar span { background: var(--sf-signal-amber); }
.wz-forecast-val {
  font-family: var(--font-mono); font-size: 12px; font-weight: 700;
  color: var(--wz-text-strong);
}
.wz-forecast-gust {
  font-family: var(--font-mono); font-size: 9px; color: var(--wz-text-muted);
}
.wz-legend {
  display: flex; flex-wrap: wrap; gap: 8px 14px;
  padding: 4px 16px 14px;
  font-size: 11px; color: var(--wz-text-muted);
}
.wz-legend span { display: inline-flex; align-items: center; gap: 5px; }
.wz-legend-swatch { width: 10px; height: 10px; border-radius: 2px; }
.wz-legend-note { color: var(--wz-text-soft); }

/* ── Auth list (airspace) ─────────────────────────────────── */
.wz-auth-list { display: flex; flex-direction: column; padding: 0; }
.wz-auth-row {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 4px 10px;
  align-items: center;
  padding: 12px 16px;
  border-bottom: 1px solid var(--wz-divider);
}
.wz-auth-row:last-child { border-bottom: 0; }
.wz-auth-name {
  font-size: 13px; color: var(--wz-text-strong); font-weight: 600;
}
.wz-auth-value {
  grid-column: 1 / 2;
  font-family: var(--font-mono); font-size: 11px; color: var(--wz-text-muted);
}

/* ── NOTAM list ───────────────────────────────────────────── */
.wz-notam-list { list-style: none; margin: 0; padding: 4px 16px 14px; display: flex; flex-direction: column; gap: 10px; }
.wz-notam {
  background: var(--wz-card-bg-2);
  border-radius: 8px;
  padding: 10px 12px;
  border: 1px solid var(--wz-card-stroke);
}
.wz-notam header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 4px;
}
.wz-notam-id {
  font-family: var(--font-mono); font-size: 11px; font-weight: 700;
  color: var(--wz-text-strong);
  background: var(--wz-mono-bg);
  padding: 2px 6px; border-radius: 4px;
}
.wz-notam-label { font-size: 13px; color: var(--wz-text-strong); font-weight: 600; }
.wz-notam-detail { font-size: 12px; color: var(--wz-text-soft); margin-top: 3px; line-height: 1.5; }

/* ── Regulatory rows ──────────────────────────────────────── */
.wz-reg-list { list-style: none; margin: 0; padding: 0; }
.wz-reg { border-bottom: 1px solid var(--wz-divider); }
.wz-reg:last-child { border-bottom: 0; }
.wz-reg-row {
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 12px;
  width: 100%;
  padding: 12px 16px;
  background: transparent;
  border: 0;
  text-align: left;
  font-family: inherit;
  cursor: pointer;
  align-items: center;
}
.wz-reg-row:hover { background: var(--wz-card-bg-2); }
.wz-reg-checkmark {
  width: 24px; height: 24px; border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  background: rgba(168,180,0,0.18);
  color: #6F7B00;
  flex-shrink: 0;
}
.wz-reg[data-state="attention"] .wz-reg-checkmark {
  background: rgba(235,152,0,0.2);
  color: var(--sf-signal-amber);
}
.wz-reg-body { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.wz-reg-id {
  font-family: var(--font-mono); font-size: 10px;
  color: var(--wz-text-muted); letter-spacing: 0.06em;
}
.wz-reg-label { font-size: 13px; font-weight: 700; color: var(--wz-text-strong); }
.wz-reg-detail { font-size: 12px; color: var(--wz-text-soft); }
.wz-reg-chev {
  font-size: 20px; color: var(--wz-text-muted);
  transition: transform 180ms var(--ease-out);
  transform-origin: center;
}
.wz-reg-chev[data-open="true"] { transform: rotate(90deg); }
.wz-reg-expand {
  padding: 4px 16px 14px 52px;
  display: flex; flex-direction: column; gap: 0;
  background: var(--wz-card-bg-2);
}
.wz-reg-expand .wz-data-row { padding: 6px 0; }
.wz-reg-expand .wz-callout { margin-top: 8px; }

/* ── Number display (parameters) ──────────────────────────── */
.wz-numdisplay {
  display: flex; align-items: baseline; gap: 6px;
  font-family: var(--font-mono);
  color: var(--wz-text-strong);
}
.wz-numdisplay--lg .wz-numdisplay-value { font-size: 44px; font-weight: 700; line-height: 1; letter-spacing: -0.02em; }
.wz-numdisplay--lg .wz-numdisplay-unit { font-size: 14px; color: var(--wz-text-muted); font-weight: 400; text-transform: uppercase; letter-spacing: 0.06em; }

/* ── Slider ───────────────────────────────────────────────── */
.wz-slider { display: flex; flex-direction: column; gap: 4px; }
.wz-slider-input {
  appearance: none; -webkit-appearance: none;
  width: 100%; height: 28px;
  background: transparent;
}
.wz-slider-input::-webkit-slider-runnable-track {
  height: 6px; border-radius: 3px;
  background: linear-gradient(to right, var(--vf-red) 0 var(--pct), var(--wz-divider) var(--pct) 100%);
}
.wz-slider-input::-moz-range-track {
  height: 6px; border-radius: 3px; background: var(--wz-divider);
}
.wz-slider-input::-moz-range-progress {
  height: 6px; border-radius: 3px; background: var(--vf-red);
}
.wz-slider-input::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 24px; height: 24px;
  border-radius: 50%;
  background: white;
  border: 3px solid var(--vf-red);
  margin-top: -9px;
  cursor: grab;
  box-shadow: 0 2px 6px rgba(0,0,0,0.2);
}
.wz-slider-input::-moz-range-thumb {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: white;
  border: 3px solid var(--vf-red);
  cursor: grab;
}
.wz-slider-scale {
  display: flex; justify-content: space-between;
  font-family: var(--font-mono); font-size: 10px;
  color: var(--wz-text-muted);
}
.wz-slider-mark { color: var(--wz-text-soft); }
.wz-coverage-est { margin-top: 6px; padding-top: 8px; border-top: 1px dashed var(--wz-divider); }
.wz-coverage-est .wz-data-row { padding: 6px 0; }
.wz-coverage-est .wz-data-row:last-child { border-bottom: 0; }

/* ── Signature pad ────────────────────────────────────────── */
.wz-sig {
  position: relative;
  background: var(--wz-card-bg);
  border: 1px solid var(--wz-card-stroke);
  border-radius: 8px;
  aspect-ratio: 16 / 7;
  overflow: hidden;
}
.wz-sig-canvas { position: absolute; inset: 0; width: 100%; height: 100%; touch-action: none; cursor: crosshair; }
.wz-sig-baseline {
  position: absolute;
  left: 16px; right: 16px; bottom: 18%;
  display: flex; align-items: center; gap: 8px;
  pointer-events: none;
}
.wz-sig-x { font-size: 22px; color: var(--wz-text-muted); font-family: var(--font-mono); }
.wz-sig-line { flex: 1; height: 1px; background: var(--wz-divider); }
.wz-sig-hint {
  position: absolute; bottom: -22px; left: 26px;
  font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--wz-text-muted); font-weight: 700;
}
.wz-sig-clear {
  position: absolute; right: 10px; top: 10px;
  background: var(--wz-card-bg-2);
  border: 1px solid var(--wz-card-stroke);
  border-radius: 6px;
  padding: 4px 10px;
  font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase;
  font-weight: 700; color: var(--wz-text-soft);
  font-family: inherit;
  cursor: pointer;
}

.wz-codeblock {
  display: block;
  font-family: var(--font-mono);
  font-size: 11px;
  background: var(--wz-card-bg-2);
  padding: 12px 14px;
  border-radius: 6px;
  white-space: pre;
  color: var(--wz-text-soft);
  margin: 0 16px 14px;
  overflow-x: auto;
  line-height: 1.6;
}

/* ── Risk bar ─────────────────────────────────────────────── */
.wz-risk-bar {
  position: relative;
  height: 10px;
  background: linear-gradient(to right, #A8B400 0%, #A8B400 30%, var(--sf-signal-amber) 30%, var(--sf-signal-amber) 70%, var(--vf-red) 70%, var(--vf-red) 100%);
  border-radius: 5px;
  margin: 4px 16px 28px;
  opacity: 0.85;
}
.wz-risk-bar-fill {
  position: absolute; top: -2px; bottom: -2px;
  background: rgba(0,0,0,0.15);
  border-right: 3px solid var(--wz-text-strong);
  border-radius: 5px 0 0 5px;
}
.wz-risk-bar-marks span {
  position: absolute; top: 16px;
  font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--wz-text-muted); font-weight: 700;
  transform: translateX(-50%);
}

.wz-statements { display: flex; flex-direction: column; gap: 6px; }

/* ── Rail (tablet+) ───────────────────────────────────────── */
@media (min-width: 768px) {
  .wz-app { flex-direction: row; }
  .wz-rail {
    display: flex; flex-direction: column;
    width: 280px;
    flex-shrink: 0;
    background: var(--wz-rail-bg);
    border-right: 1px solid var(--wz-divider);
    position: sticky; top: 0;
    height: 100vh;
    overflow-y: auto;
  }
  .wz-main { min-height: 100vh; flex: 1; }
  .wz-topbar { position: sticky; top: 0; }
  .wz-progress { top: 60px; }
  .wz-topbar-menu { display: none; }
  .wz-topbar-pkg { display: flex; }
  .wz-stephead { padding: 28px 28px 8px; }
  .wz-stephead-title { font-size: 28px; }
  .wz-stephead-num-current { font-size: 44px; }
  .wz-step-content { padding: 16px 28px 28px; max-width: 760px; }
  .wz-footer { padding: 14px 28px calc(14px + env(safe-area-inset-bottom)); }
  .wz-row-2 { grid-template-columns: 1fr 1fr; }
}

.wz-rail-header {
  padding: 20px 18px 16px;
  border-bottom: 1px solid var(--wz-divider);
}
.wz-rail-eyebrow {
  display: flex; align-items: center; gap: 8px;
  font-size: 13px; font-weight: 700; color: var(--wz-text-strong);
}
.wz-rail-title { font-size: 18px; font-weight: 700; color: var(--wz-text-strong); margin-top: 6px; }
.wz-rail-pkg {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 12px;
  padding: 8px 10px;
  background: var(--wz-card-bg-2);
  border-radius: 6px;
}
.wz-rail-pkg span {
  font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--wz-text-muted); font-weight: 700;
}
.wz-rail-pkg code {
  font-family: var(--font-mono); font-size: 12px; font-weight: 700; color: var(--wz-text-strong);
}
.wz-rail-progress {
  display: flex; align-items: center; gap: 8px;
  margin-top: 10px;
}
.wz-rail-progress-bar {
  flex: 1; height: 4px; background: var(--wz-divider); border-radius: 2px; overflow: hidden;
}
.wz-rail-progress-fill { height: 100%; background: var(--vf-red); transition: width 300ms var(--ease-out); }
.wz-rail-progress-pct {
  font-family: var(--font-mono); font-size: 11px; font-weight: 700; color: var(--wz-text-strong);
}

.wz-rail-list {
  list-style: none; margin: 0; padding: 8px 8px 16px;
  flex: 1;
  display: flex; flex-direction: column; gap: 2px;
}
.wz-rail-item {
  display: flex; align-items: center; gap: 10px;
  width: 100%;
  padding: 9px 10px;
  background: transparent;
  border: 0;
  border-radius: 6px;
  cursor: pointer;
  text-align: left;
  font-family: inherit;
  color: var(--wz-text-soft);
}
.wz-rail-item:hover { background: var(--wz-card-bg-2); }
.wz-rail-item--active {
  background: var(--vf-red-tint); color: var(--wz-text-strong);
}
[data-theme="dark"] .wz-rail-item--active { background: rgba(230,0,0,0.15); }
.wz-rail-glyph {
  width: 24px; height: 24px;
  flex-shrink: 0;
  border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  font-family: var(--font-mono); font-size: 10px; font-weight: 700;
  background: var(--wz-chip-bg);
  color: var(--wz-text-muted);
  border: 1px solid var(--wz-divider);
}
.wz-rail-glyph--complete { background: rgba(168,180,0,0.22); color: #6F7B00; border-color: rgba(168,180,0,0.4); }
[data-theme="dark"] .wz-rail-glyph--complete { color: #C5D24C; }
.wz-rail-glyph--review { background: rgba(0,176,202,0.14); color: var(--sf-sky-dark); border-color: rgba(0,176,202,0.3); }
[data-theme="dark"] .wz-rail-glyph--review { color: #5EC8DC; }
.wz-rail-glyph--active { box-shadow: 0 0 0 3px var(--vf-red-tint); }
[data-theme="dark"] .wz-rail-glyph--active { box-shadow: 0 0 0 3px rgba(230,0,0,0.2); }

.wz-rail-text { display: flex; flex-direction: column; gap: 1px; min-width: 0; }
.wz-rail-name { font-size: 13px; font-weight: 700; }
.wz-rail-item--active .wz-rail-name { color: var(--wz-text-strong); }
.wz-rail-meta {
  font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--wz-text-muted); font-weight: 700;
}

.wz-rail-footer {
  padding: 12px 18px;
  border-top: 1px solid var(--wz-divider);
  display: flex; flex-direction: column; gap: 6px;
}
.wz-rail-footer-row {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 11px; color: var(--wz-text-muted);
}
.wz-rail-footer-row code {
  font-family: var(--font-mono); color: var(--wz-text-soft);
}

/* ── Drawer (phone-only) ──────────────────────────────────── */
.wz-drawer {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 100;
  display: flex;
}
.wz-drawer-panel {
  width: 80%; max-width: 320px;
  background: var(--wz-rail-bg);
  height: 100%;
  overflow-y: auto;
  animation: drawerIn 200ms var(--ease-out);
}
@keyframes drawerIn { from { transform: translateX(-100%); } to { transform: translateX(0); } }
.wz-drawer-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px;
  border-bottom: 1px solid var(--wz-divider);
  font-size: 13px; font-weight: 700; color: var(--wz-text-strong);
}

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  // Auto-inject a rail toggle when a <deck-stage> is on the page. The
  // toggle drives the deck's per-viewer _railVisible via window message;
  // state is mirrored from the same localStorage key the deck reads so
  // the control reflects reality across reloads. The mechanism is the
  // message — authors who want custom placement can post it directly
  // and pass noDeckControls to suppress this one.
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  // deck-stage enables its rail in connectedCallback, but this panel can
  // mount before that element has upgraded. The initial read catches the
  // common case; the listener covers mounting first. (Older deck-stage.js
  // copies still wait for the host's __omelette_rail_enabled postMessage —
  // same listener handles those.)
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

/* ────────────────────────────────────────────────────────────

   Used by step components. Technical-leaning: clear labels,
   monospaced data values, explicit field IDs, visible validation.

// ── Field wrapper: label, ref-code, helper, error, value
const Field = ({ id, label, helper, error, status, required, children, valuePlayback }) => {
  return (
    <div className="wz-field" data-status={status || 'empty'}>
      <div className="wz-field-header">
        <label htmlFor={id} className="wz-field-label">
          {label}
          {required && <span className="wz-field-required" aria-label="required">*</span>}
        </label>
        <code className="wz-field-ref">{id}</code>
      </div>
      {helper && <div className="wz-field-helper">{helper}</div>}
      {valuePlayback && (
        <div className="wz-field-playback">
          <span className="wz-field-playback-tag">RECORDED</span>
          <span className="wz-field-playback-value">{valuePlayback}</span>
        </div>
      )}
      <div className="wz-field-control">{children}</div>
      {error && <div className="wz-field-error" role="alert">{error}</div>}
    </div>
  );
};

// ── Data row (key/value, mono value) — used for read-only telemetry
const DataRow = ({ label, value, unit, status }) => (
  <div className="wz-data-row" data-status={status || 'ok'}>
    <span className="wz-data-label">{label}</span>
    <span className="wz-data-value">
      <span className="wz-data-number">{value}</span>
      {unit && <span className="wz-data-unit">{unit}</span>}
    </span>
  </div>
);

// ── Status pill
const StatusPill = ({ status, label }) => {
  // status: ok | warn | error | info | pending | prefilled | locked
  return (
    <span className="wz-pill" data-status={status}>
      <span className="wz-pill-dot" aria-hidden="true"></span>
      {label || status.toUpperCase()}
    </span>

};

// ── Section card
const Card = ({ title, eyebrow, headerRight, children, tight, dataSource }) => (
  <section className={"wz-card" + (tight ? " wz-card--tight" : "")}>
    {(title || eyebrow || headerRight) && (
      <header className="wz-card-header">
        <div>
          {eyebrow && <div className="wz-card-eyebrow">{eyebrow}</div>}
          {title && <h3 className="wz-card-title">{title}</h3>}
        </div>
        {headerRight}
      </header>
    )}
    {children}
    {dataSource && (
      <footer className="wz-card-footer">
        <span className="wz-card-footer-label">Source</span>
        <code className="wz-card-footer-value">{dataSource}</code>
      </footer>

);

// ── Inline help / callout banner
const Callout = ({ tone, title, children, icon }) => (
  <div className="wz-callout" data-tone={tone || 'info'}>
    <div className="wz-callout-icon" aria-hidden="true">{icon || (tone === 'warn' ? '!' : tone === 'error' ? '×' : 'i')}</div>
    <div className="wz-callout-body">
      {title && <div className="wz-callout-title">{title}</div>}
      <div className="wz-callout-text">{children}</div>
    </div>
  </div>
);

// ── Choice tile — used for radio / multi-select option lists
const ChoiceTile = ({ checked, multi, label, sub, value, onChange, severity, disabled }) => (
  <label className={"wz-choice" + (checked ? " wz-choice--checked" : "") + (disabled ? " wz-choice--disabled" : "")} data-severity={severity}>
    <input
      type={multi ? "checkbox" : "radio"}
      checked={!!checked}
      onChange={() => !disabled && onChange(value)}
      disabled={disabled}
      className="wz-choice-input"
    />
    <span className="wz-choice-mark" aria-hidden="true"></span>
    <span className="wz-choice-body">
      <span className="wz-choice-label">{label}</span>
      {sub && <span className="wz-choice-sub">{sub}</span>}
    </span>
  </label>
);

// ── Text input
const TextInput = React.forwardRef(({ id, value, onChange, placeholder, type='text', inputMode, maxLength, prefix, suffix }, ref) => (
  <div className="wz-input-wrap">
    {prefix && <span className="wz-input-prefix">{prefix}</span>}
    <input
      ref={ref}
      id={id}
      type={type}
      inputMode={inputMode}
      value={value || ''}
      onChange={e => onChange(e.target.value)}
      placeholder={placeholder}
      maxLength={maxLength}
      className="wz-input"
    />
    {suffix && <span className="wz-input-suffix">{suffix}</span>}

));

// ── Stepped value indicator (used by sliders)
const NumberDisplay = ({ value, unit, size='lg' }) => (
  <div className={"wz-numdisplay wz-numdisplay--" + size}>
    <span className="wz-numdisplay-value">{value}</span>
    {unit && <span className="wz-numdisplay-unit">{unit}</span>}

// ── Slider with tick + range labels
const RangeSlider = ({ id, min, max, step, value, onChange, marks }) => (
  <div className="wz-slider">
    <input
      id={id}
      type="range"
      min={min}
      max={max}
      step={step}

    <div className="wz-slider-scale">
      <span>{min}</span>
      {marks && marks.map((m, i) => <span key={i} className="wz-slider-mark">{m}</span>)}
      <span>{max}</span>
    </div>
  </div>
);

Object.assign(window, {
  Field, DataRow, StatusPill, Card, Callout, ChoiceTile, TextInput, NumberDisplay, RangeSlider,
});

/* ────────────────────────────────────────────────────────────
   Sky-Fi Wizard — Review-type steps
   Pre-populated by the backend; operator confirms with
   "Agree and continue". Each step exposes both the data and
   the source/timestamp so the technician can audit it.
──────────────────────────────────────────────────────────── */

/* ── 1. Location ───────────────────────────────────────────── */
const LocationStep = ({ data, setData, prefilled }) => {
  const wrap = React.useRef(null);
  const [pin, setPin] = React.useState(data.pin || (prefilled ? { x: 0.62, y: 0.41 } : null));
  const [coords, setCoords] = React.useState(data.coords || (prefilled ? { lat: 36.1408, lng: 36.1219 } : null));
  const [zone, setZone] = React.useState(data.zone || (prefilled ? 'Antakya — Sector 4' : ''));

  React.useEffect(() => { setData({ pin, coords, zone }); }, [pin, coords, zone]);

  const handleTap = (e) => {
    const rect = wrap.current.getBoundingClientRect();
    const x = (e.clientX - rect.left) / rect.width;
    const y = (e.clientY - rect.top) / rect.height;
    const newPin = { x: Math.max(0.02, Math.min(0.98, x)), y: Math.max(0.02, Math.min(0.98, y)) };
    setPin(newPin);
    // Synthesize coordinates from pin position
    const lat = (36.10 + newPin.y * 0.08).toFixed(4);
    const lng = (36.08 + newPin.x * 0.10).toFixed(4);
    setCoords({ lat: Number(lat), lng: Number(lng) });
    setZone('Custom pin — Sector ' + Math.ceil(newPin.x * 6));
  };

  const useGPS = () => {
    setPin({ x: 0.50, y: 0.55 });
    setCoords({ lat: 36.1440, lng: 36.1280 });
    setZone('GPS lock — Sector 3');
  };

  return (
    <div className="wz-step-body">
      <Callout tone={prefilled ? 'ok' : 'info'} title={prefilled ? 'Pin pre-set by dispatch' : 'Tap the map to set your launch point'}>
        {prefilled
          ? 'This site was selected by Sector Lead during Operation briefing. Verify it matches what you see on the ground, then continue.'
          : 'Drop a pin within 200 m of your physical launch site. Sky-Fi will use it to query airspace, regulatory, and weather services.'}
      </Callout>

      <Field
        id="LOC-001"
        label="Launch site"
        helper="Tap the terrain below or use GPS. Coordinates are sent to airspace authorities."
        status={pin ? 'ok' : 'empty'}
        required
      >
        <div className="wz-map" ref={wrap} onClick={handleTap} role="button" aria-label="Map. Tap to set launch pin.">
          {/* Stylised terrain map (svg) */}
          <svg className="wz-map-svg" viewBox="0 0 600 400" preserveAspectRatio="xMidYMid slice">
            <defs>
              <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                <path d="M40 0H0V40" fill="none" stroke="rgba(0,0,0,0.06)" strokeWidth="1"/>
              </pattern>
              <pattern id="gridMajor" width="200" height="200" patternUnits="userSpaceOnUse">
                <path d="M200 0H0V200" fill="none" stroke="rgba(0,0,0,0.12)" strokeWidth="1"/>
              </pattern>
            </defs>
            <rect width="600" height="400" fill="#EDE6D8"/>
            {/* land mass / river */}
            <path d="M0 280 C 80 260 140 310 220 290 S 360 250 460 280 S 580 320 600 300 L 600 400 L 0 400 Z" fill="#C5D6A8" opacity="0.55"/>
            <path d="M0 250 C 100 220 200 270 300 240 S 500 200 600 230" fill="none" stroke="#79A3C7" strokeWidth="6" opacity="0.5"/>
            <path d="M0 250 C 100 220 200 270 300 240 S 500 200 600 230" fill="none" stroke="#79A3C7" strokeWidth="2"/>
            {/* Road grid */}
            <path d="M0 150 L600 150 M0 320 L600 320 M180 0 L180 400 M420 0 L420 400" stroke="rgba(60,60,60,0.4)" strokeWidth="1.5"/>
            <rect width="600" height="400" fill="url(#grid)"/>
            <rect width="600" height="400" fill="url(#gridMajor)"/>
            {/* Restricted zone */}
            <circle cx="120" cy="100" r="70" fill="#E60000" opacity="0.08" stroke="#E60000" strokeDasharray="6 4" strokeWidth="1.5"/>
            <text x="120" y="105" textAnchor="middle" fontSize="11" fontWeight="700" fill="#B30000" letterSpacing="0.1em">NO-FLY</text>
            {/* Settlements (label markers) */}
            {[
              { x: 200, y: 230, label: 'AID HUB' },
              { x: 380, y: 180, label: 'CLINIC' },
              { x: 460, y: 310, label: 'BASE' },
            ].map((s, i) => (
              <g key={i}>
                <rect x={s.x - 18} y={s.y - 7} width="36" height="14" fill="rgba(255,255,255,0.85)" rx="2"/>
                <text x={s.x} y={s.y + 3} textAnchor="middle" fontSize="9" fontWeight="700" fill="#1A1A1A" letterSpacing="0.06em">{s.label}</text>
              </g>
            ))}
          </svg>

          {/* Crosshair grid overlay */}
          <div className="wz-map-crosshair">
            <span></span><span></span>
          </div>

          {pin && (
            <div className="wz-map-pin" style={{ left: (pin.x * 100) + '%', top: (pin.y * 100) + '%' }}>
              <span className="wz-map-pin-ring"></span>
              <span className="wz-map-pin-dot"></span>
            </div>
          )}

          <div className="wz-map-overlay-top">
            <code className="wz-map-coord">
              {coords ? `${coords.lat}°N  ${coords.lng}°E` : 'Tap to drop pin'}
            </code>
            <span className="wz-map-scale">200 m</span>
          </div>
        </div>
      </Field>

      <div className="wz-row-actions">
        <button type="button" className="wz-btn wz-btn--ghost" onClick={useGPS}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
          Use device GPS
        </button>
        <button type="button" className="wz-btn wz-btn--ghost" onClick={() => { setPin(null); setCoords(null); setZone(''); }}>
          Clear pin
        </button>
      </div>

      <div className="wz-data-grid">
        <DataRow label="Latitude" value={coords ? coords.lat.toFixed(4) : '—'} unit="°N" />
        <DataRow label="Longitude" value={coords ? coords.lng.toFixed(4) : '—'} unit="°E" />
        <DataRow label="Sector" value={zone || '—'} status={zone ? 'ok' : 'pending'} />
        <DataRow label="Distance to NFZ" value={pin ? '1.4' : '—'} unit="km" status="ok" />
      </div>
    </div>
  );
};

/* ── 2. Weather (auto-populated, review) ───────────────────── */

  // Always auto-populated. "prefilled" toggles whether the data is fresh
  // or has been recorded earlier and is being played back.
  const fetched = data.fetched ?? true;
  const ts = data.timestamp || '2026-05-16T08:42Z';

  React.useEffect(() => { setData({ fetched: true, timestamp: ts, agreed: data.agreed || false }); }, []);
  const setAgreed = (v) => setData({ fetched: true, timestamp: ts, agreed: v });

  return (
    <div className="wz-step-body">
      <Callout tone="info" title="Auto-populated from MET feed">
        Polled from <code>met.skyfi.cloud/v2/forecast</code> 4 minutes ago. Tap any field to view source data.
      </Callout>

        <div className="wz-data-grid wz-data-grid--cols2">
          <DataRow label="Wind speed" value="14" unit="km/h" status="ok" />
          <DataRow label="Wind gust" value="22" unit="km/h" status="ok" />

          <DataRow label="Visibility" value="9.2" unit="km" status="ok" />
          <DataRow label="Cloud base" value="1,400" unit="m AGL" />

          <DataRow label="Air temperature" value="18.4" unit="°C" />
          <DataRow label="Humidity" value="62" unit="%" />
          <DataRow label="Pressure (QNH)" value="1019" unit="hPa" />
          <DataRow label="Lightning risk" value="None" status="ok" />
        </div>
      </Card>

      <Card eyebrow="6-HOUR OUTLOOK" title="Acceptable for tethered operations" tight>
        <div className="wz-forecast">
          {[
            { t: '09:00', w: 14, g: 22, ok: true },
            { t: '11:00', w: 16, g: 24, ok: true },
            { t: '13:00', w: 19, g: 27, ok: true },
            { t: '15:00', w: 23, g: 31, ok: true },
            { t: '17:00', w: 26, g: 34, ok: false },
            { t: '19:00', w: 22, g: 29, ok: true },
          ].map((f, i) => (

  return (
    <div className="wz-step-body">

      <Card eyebrow="ACTIVE NOTAMS IN RADIUS" title="3 found within 25 km · all resolved">
        <ul className="wz-notam-list">
          {notams.map(n => (
            <li key={n.id} className="wz-notam">
              <header>
                <code className="wz-notam-id">{n.id}</code>
                <StatusPill status={n.status === 'cleared' ? 'ok' : 'info'} label={n.status === 'cleared' ? 'CLEARED' : 'WAIVED'} />

        <div className="wz-check-list">
          {[

            { key: 'ctr', label: 'No controlled airspace within tether radius', sub: 'Confirmed via overlay on map step.' },
            { key: 'mil', label: 'No conflicting military activity', sub: 'Coordinated via Foundation liaison desk.' },
            { key: 'emcomm', label: 'Emergency comms freq monitored on 121.5 MHz', sub: 'Required when ATS surveillance is unavailable.' },
          ].map(c => (
            <ChoiceTile
              key={c.key}

              checked={!!checks[c.key]}
              onChange={() => update(c.key, !checks[c.key])}
              label={c.label}
              sub={c.sub}
            />
          ))}
        </div>
      </Card>

};

    { id: 'REG-02', label: 'Insurance — third party liability', detail: '€2M · policy VF-2025-8812', source: 'AON Aviation', state: 'verified' },
